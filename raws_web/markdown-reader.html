<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>อ่านสบาย – Markdown Reader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Noto+Serif+Thai:wght@400;500;600;700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />

  <style>
    /* ─── Reset ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ─── CSS Variables (warm theme default) ─────────── */
    :root {
      --bg:          #FAF6F0;
      --surface:     #FFFFFF;
      --text:        #2C2418;
      --text-sec:    #7A6F60;
      --accent:      #C4956A;
      --accent-soft: #F0E6D8;
      --border:      #E8DFD2;
      --heading:     #1A1008;
      --hr:          #E0D5C5;
      --strong:      #5C3D1E;
      --shadow:      rgba(44,36,24,0.06);
      --input-bg:    #FFFDF9;
      --surface-blur:#FFFFFFE8;
    }

    /* ─── Dark theme ──────────────────────────────────── */
    body.dark {
      --bg:          #161618;
      --surface:     #1E1E22;
      --text:        #D4D0C8;
      --text-sec:    #7A7770;
      --accent:      #D4A574;
      --accent-soft: #2A2520;
      --border:      #2E2E32;
      --heading:     #EDE8E0;
      --hr:          #333338;
      --strong:      #E8C9A0;
      --shadow:      rgba(0,0,0,0.3);
      --input-bg:    #1A1A1E;
      --surface-blur:#1E1E22E8;
    }

    /* ─── Sepia theme ─────────────────────────────────── */
    body.sepia {
      --bg:          #F0E8D8;
      --surface:     #F7F0E3;
      --text:        #3E3428;
      --text-sec:    #8A7E6E;
      --accent:      #A07850;
      --accent-soft: #E8DCCB;
      --border:      #D8CCBA;
      --heading:     #2A2018;
      --hr:          #D0C4B0;
      --strong:      #6B4D30;
      --shadow:      rgba(62,52,40,0.08);
      --input-bg:    #F5EDE0;
      --surface-blur:#F7F0E3E8;
    }

    /* ─── Base ────────────────────────────────────────── */
    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'Sarabun', 'Noto Serif Thai', Georgia, serif;
      transition: background 0.5s ease, color 0.5s ease;
      display: flex;
      flex-direction: column;
    }

    /* ─── Top Bar ─────────────────────────────────────── */
    .top-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      background: var(--surface-blur);
      border-bottom: 1px solid var(--border);
      transition: background 0.5s ease, border-color 0.5s ease;
    }

    .top-bar-inner {
      max-width: 800px;
      margin: 0 auto;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon { font-size: 20px; }

    .logo-text {
      font-family: 'Noto Serif Thai', serif;
      font-weight: 700;
      font-size: 17px;
      color: var(--heading);
      transition: color 0.5s;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .sep {
      width: 1px;
      height: 20px;
      background: var(--border);
      transition: background 0.5s;
    }

    /* ─── Theme Dots ───────────────────────────────────── */
    .theme-dots {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .theme-dot {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    }

    .theme-dot:hover { transform: scale(1.15); }

    .theme-dot.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 27%, transparent);
    }

    /* ─── Font Buttons ─────────────────────────────────── */
    .font-controls { display: flex; gap: 4px; align-items: center; }

    .font-btn {
      width: 34px; height: 34px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, border-color 0.5s;
      font-family: 'Sarabun', sans-serif;
      font-weight: 700;
    }

    .font-btn:hover { background: var(--accent-soft); }

    .font-size-label {
      font-size: 12px;
      color: var(--text-sec);
      min-width: 28px;
      text-align: center;
      font-family: 'Crimson Pro', serif;
      transition: color 0.5s;
    }

    /* ─── Buttons ──────────────────────────────────────── */
    .btn {
      padding: 10px 24px;
      border-radius: 99px;
      border: none;
      font-family: 'Sarabun', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover:not(:disabled) { opacity: 0.85; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.4; cursor: default; }

    .btn-ghost {
      background: var(--accent-soft);
      color: var(--strong);
    }

    .btn-ghost:hover { opacity: 0.75; }
    .btn-ghost:disabled { opacity: 0.3; cursor: default; }

    /* ─── Main Content Area ────────────────────────────── */
    .main {
      flex: 1;
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
      padding: 32px 20px 80px;
    }

    /* ─── Paste Mode ───────────────────────────────────── */
    .paste-meta {
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: 'Sarabun', sans-serif;
      font-size: 14px;
      color: var(--text-sec);
      transition: color 0.5s;
    }

    .paste-area {
      width: 100%;
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 24px;
      font-size: 16px;
      font-family: 'Sarabun', sans-serif;
      background: var(--input-bg);
      color: var(--text);
      resize: vertical;
      min-height: 55vh;
      line-height: 1.8;
      outline: none;
      transition: border-color 0.3s ease, background 0.5s ease, color 0.5s ease;
    }

    .paste-area:focus { border-color: var(--accent); }

    .paste-area::placeholder {
      color: var(--text-sec);
      opacity: 0.6;
    }

    .paste-actions {
      margin-top: 16px;
      display: flex;
      gap: 10px;
      justify-content: space-between;
      align-items: center;
    }

    /* ─── Read Mode ────────────────────────────────────── */
    .reader-content h1 {
      font-family: 'Noto Serif Thai', 'Sarabun', serif;
      font-size: 1.75em;
      font-weight: 700;
      color: var(--heading);
      margin: 1.8em 0 0.7em 0;
      line-height: 1.5;
      letter-spacing: -0.01em;
      position: relative;
      padding-bottom: 0.4em;
      transition: color 0.5s;
    }

    .reader-content h1::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0;
      width: 60px; height: 3px;
      background: var(--accent);
      border-radius: 2px;
      transition: background 0.5s;
    }

    .reader-content h1:first-child { margin-top: 0; }

    .reader-content h2 {
      font-family: 'Noto Serif Thai', 'Sarabun', serif;
      font-size: 1.35em;
      font-weight: 600;
      color: var(--heading);
      margin: 1.6em 0 0.6em 0;
      line-height: 1.5;
      padding-left: 14px;
      border-left: 3px solid var(--accent);
      transition: color 0.5s, border-color 0.5s;
    }

    .reader-content h3 {
      font-family: 'Sarabun', sans-serif;
      font-size: 1.1em;
      font-weight: 600;
      color: var(--strong);
      margin: 1.4em 0 0.5em 0;
      line-height: 1.5;
      transition: color 0.5s;
    }

    .reader-content p {
      margin: 0 0 1.15em 0;
      line-height: 2;
      color: var(--text);
      text-align: justify;
      word-break: break-word;
      transition: color 0.5s;
    }

    .reader-content strong {
      font-weight: 600;
      color: var(--strong);
      transition: color 0.5s;
    }

    .reader-content em { font-style: italic; }

    .reader-content hr.divider {
      border: none;
      height: 1px;
      background: var(--hr);
      margin: 2.5em auto;
      width: 40%;
      transition: background 0.5s;
    }

    .reader-footer {
      margin-top: 60px;
      padding-top: 30px;
      border-top: 1px solid var(--hr);
      text-align: center;
      transition: border-color 0.5s;
    }

    /* ─── Animations ───────────────────────────────────── */
    .fade-in {
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── Scrollbar ────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ─── Responsive ───────────────────────────────────── */
    @media (max-width: 768px) {
      .reader-content h1 { font-size: 1.45em; }
      .reader-content h2 { font-size: 1.2em; }
      .reader-content p  { line-height: 1.95; text-align: left; }
    }
  </style>
</head>

        <button class="btn btn-primary" id="btn-read" onclick="tryRead()" disabled>อ่าน →</button>
      </div>
    </div>
  </header>

  <!-- Main -->
  <main class="main" id="main">

    <!-- Paste view -->
    <div id="view-paste" class="fade-in">

      </div>
      <textarea
        id="textarea"
        class="paste-area"
        spellcheck="false"
        placeholder="# วางข้อความ Markdown ที่นี่

## ตัวอย่าง
เนื้อหาของคุณจะแสดงผลอย่างสวยงาม...

**ตัวหนา** และ *ตัวเอียง* รองรับครบ"
      ></textarea>
      <div class="paste-actions">
        <button class="btn btn-ghost" id="btn-clear" onclick="clearText()" style="font-size:13px;padding:8px 16px;" disabled>ล้างทั้งหมด</button>
        <button class="btn btn-primary" id="btn-start" onclick="tryRead()" style="padding:12px 32px;font-size:16px;" disabled>📖 เริ่มอ่าน</button>
      </div>
    </div>

    <!-- Read view (hidden initially) -->
    <div id="view-read" style="display:none;">
      <div id="reader-content" class="reader-content fade-in"></div>
      <div class="reader-footer">
        <button class="btn btn-ghost" onclick="scrollTop()" style="font-size:14px">↑ กลับด้านบน</button>
      </div>
    </div>

  </main>

  <script>
    /* ════════════════════════════════════════════════════

    const MARKDOWN_CONTENT = `

    # สรุปเนื้อหาสอบวิชากฎหมายมหาชน — แบบบรรยายตอบข้อสอบ

---

## หัวข้อที่ 1: ความหมาย องค์ประกอบ รูปแบบของรัฐ และสัญญาประชาคม

ในการศึกษากฎหมายมหาชน สิ่งแรกที่ต้องทำความเข้าใจอย่างถ่องแท้คือแนวคิดเกี่ยวกับ "รัฐ" เพราะรัฐเป็นจุดเริ่มต้นของการใช้อำนาจสาธารณะทั้งปวง หากไม่เข้าใจว่ารัฐคืออะไร มีองค์ประกอบใด และเกิดขึ้นมาได้อย่างไร ก็ยากที่จะเข้าใจโครงสร้างของกฎหมายมหาชนได้อย่างลึกซึ้ง

**ความหมายของรัฐ**

คำว่า "รัฐ" มีผู้ให้นิยามไว้หลากหลายทั้งในแวดวงวิชาการไทยและต่างประเทศ พจนานุกรมราชบัณฑิตยสถานให้ความหมายไว้อย่างกว้างว่ารัฐหมายถึงแคว้น บ้านเมือง หรือประเทศ ซึ่งเป็นความหมายในเชิงสามัญที่คนทั่วไปเข้าใจ แต่ในทางนิติศาสตร์และรัฐศาสตร์แล้ว ความหมายของรัฐมีความลึกซึ้งและซับซ้อนกว่านั้นมาก

ศาสตราจารย์ ปรีดี พนมยงค์ รัฐบุรุษอาวุโสของไทย ได้อธิบายว่ารัฐคือ "สังคมการเมือง" (Political Society) รูปแบบหนึ่ง ซึ่งตั้งอยู่เหนือดินแดนส่วนหนึ่ง มีอำนาจอธิปไตยโดยสมบูรณ์ทั้งภายในและระหว่างประเทศ และมีองค์กรไว้ซึ่งอำนาจในการพิทักษ์รักษาความสงบเรียบร้อยของกลุ่มชาติ คำนิยามนี้ชี้ให้เห็นว่ารัฐมิใช่เป็นเพียงพื้นที่ทางภูมิศาสตร์ แต่เป็นองค์กรทางการเมืองที่มีอำนาจและเจตจำนงในตัวเอง ในทำนองเดียวกัน ศาสตราจารย์ โภคิน พลกุล ได้นิยามว่ารัฐคือกลุ่มมนุษย์ที่อยู่บนดินแดนที่กำหนด มีการใช้อำนาจทางการเมืองโดยเฉพาะ ส่วนศาสตราจารย์ วิษณุ เครืองาม อธิบายเพิ่มเติมว่ารัฐคือประเทศหรือสังคมการเมืองที่ตั้งแบบแผน มีการจัดระเบียบองค์กรเป็นระเบียบทางการเมืองการปกครอง

ในฝ่ายนักวิชาการตะวันตก Max Weber ได้ให้ทัศนะที่สำคัญยิ่งว่ารัฐคือองค์กรที่ผูกขาดการใช้ความรุนแรงโดยชอบธรรม เอกชนไม่สามารถให้ความยุติธรรมแก่กันได้โดยไม่ทำให้เสียหลักอำนาจสาธารณะ นิยามนี้ชี้ให้เห็นว่าสิ่งที่แยกรัฐออกจากองค์กรอื่นทั้งหมดคือสิทธิ์ขาดในการใช้กำลังบังคับ George Pompidou กล่าวเสริมว่ารัฐมีหน้าที่รักษาวินัย เพราะการปกครองคือการจัดระเบียบบังคับบัญชานั่นเอง นอกจากนี้ Hauriou และ Gicquel ยังแยกความหมายออกเป็นสองมิติ กล่าวคือมิติทางภูมิศาสตร์ซึ่งหมายถึงการกำหนดถิ่นที่อยู่ของประชากร และมิติทางกฎหมายซึ่งหมายถึงรัฐในฐานะเครื่องหมายแสดงออกของจิตใจและแนวความคิดของสังคม

สิ่งที่น่าสังเกตเป็นพิเศษคือทัศนะของ Carré de Malberg ซึ่งมองว่ารัฐเป็น "นิติบุคคล" (Personne morale) กล่าวคือรัฐมีสถานะเป็นบุคคลในทางกฎหมาย มีสิทธิและหน้าที่เป็นของตัวเอง แยกต่างหากจากบุคคลธรรมดาที่อยู่ภายใน แนวคิดนี้สำคัญอย่างยิ่งในทางนิติศาสตร์ เพราะทำให้เข้าใจว่ารัฐสามารถทำนิติกรรม ถือครองทรัพย์สิน และรับผิดชอบต่อการกระทำของตนได้ ในทางนิติศาสตร์จึงเรียกว่ารัฐเป็น "นิติบุคคลมหาชน" (State public entity) ซึ่งแตกต่างจากนิติบุคคลเอกชนตรงที่มีอำนาจทางกฎหมายฝ่ายเดียวและมีวัตถุประสงค์เพื่อประโยชน์สาธารณะ

**องค์ประกอบของรัฐสมัยใหม่**

รัฐสมัยใหม่ประกอบด้วยองค์ประกอบสำคัญ 4 ประการ ประการแรกคือประชากรหรือพลเมือง (Population) ซึ่งเป็นกลุ่มมนุษย์ที่อยู่ร่วมกันภายในรัฐ ประการที่สองคือดินแดนหรืออาณาเขตที่แน่นอน (Territory) เพราะหากไม่มีดินแดนก็ไม่อาจเรียกว่าเป็นรัฐได้ ประการที่สามคืออำนาจอธิปไตย (Sovereignty) ซึ่งเป็นอำนาจสูงสุดในการปกครองรัฐ และประการที่สี่คือระบบกฎหมายหรือข้อผูกพันทางกฎหมาย (Legal System) ที่ใช้บังคับภายในรัฐ องค์ประกอบทั้งสี่ประการนี้ขาดสิ่งใดสิ่งหนึ่งมิได้ เพราะหากขาดไปก็ไม่อาจถือว่าเป็นรัฐในความหมายทางกฎหมายได้อย่างสมบูรณ์

**กำเนิดรัฐสมัยใหม่**

แนวคิดเรื่องรัฐสมัยใหม่มีรากฐานมาจากยุโรปตะวันตก Marsile de Padoue (ค.ศ.1275-1342) เป็นนักรัฐศาสตร์คนแรกๆ ที่ต่อต้านอำนาจศาสนจักรและเรียกร้องให้แยกอำนาจทางโลกออกจากอำนาจทางศาสนา แต่ผู้ที่มีบทบาทสำคัญที่สุดในการนิยาม "รัฐสมัยใหม่" คือ Nicolas Machiavelli (ค.ศ.1469-1527) ผู้เขียนหนังสือ "Le Prince" หรือ "เจ้าชาย" ในปี ค.ศ.1513 Machiavelli แบ่งการปกครองเป็น 2 รูปแบบ คือสาธารณรัฐและราชอาณาจักร และเสนอว่าศาสนจักรต้องแยกออกจากอาณาจักร เพราะการเมืองคือเรื่องของการใช้อำนาจปกครอง มิใช่เรื่องของศาสนา แนวคิดนี้ถือเป็นจุดเริ่มต้นสำคัญของการมองรัฐในฐานะสถาบันทางโลกที่เป็นอิสระ

**รูปแบบของรัฐ**

รูปแบบของรัฐสามารถพิจารณาได้จาก 3 มุมมอง มุมมองแรกพิจารณาจากประมุขของรัฐ ซึ่งแบ่งออกเป็นราชอาณาจักรหรือราชาธิปไตย (Monarchy) ที่มีพระมหากษัตริย์เป็นประมุข เช่น ประเทศไทย อังกฤษ ญี่ปุ่น กัมพูชา กับสาธารณรัฐ (Republic) ที่ประมุขมาจากวิธีอื่น เช่น การเลือกตั้ง การปฏิวัติ หรือการทำสงครามกลางเมือง มุมมองที่สองพิจารณาจากรูปแบบการปกครอง ซึ่งอาจเป็นรัฐเสรีนิยมประชาธิปไตย รัฐเผด็จการ หรือรัฐสังคมนิยม

มุมมองที่สามซึ่งมีความสำคัญอย่างยิ่งในทางกฎหมายมหาชนคือการพิจารณาจากโครงสร้างอำนาจรัฐ โดยแบ่งออกเป็นรัฐเดี่ยว (Unitary State) ซึ่งอำนาจอธิปไตยมีศูนย์รวมอยู่ที่รัฐบาลกลาง เป็นรัฐที่มีลักษณะรวมศูนย์กลางทางการเมือง มีอำนาจเอกภาพไม่แยกจากกัน ประเทศไทยเป็นตัวอย่างสำคัญของรัฐเดี่ยว ดังที่รัฐธรรมนูญแห่งราชอาณาจักรไทย พ.ศ.2560 มาตรา 1 บัญญัติว่า "ประเทศไทยเป็นราชอาณาจักรอันหนึ่งอันเดียว จะแบ่งแยกมิได้" ตัวอย่างอื่นได้แก่ ฝรั่งเศส สเปน ญี่ปุ่น โปรตุเกส ส่วนรัฐรวม (Federal/Complex State) เกิดจากการที่ตั้งแต่สองรัฐขึ้นไปมารวมกัน ซึ่งมีสองรูปแบบย่อย ได้แก่ สมาพันธรัฐ (Confederation) ที่รวมตัวกันโดยสนธิสัญญาและรัฐสมาชิกมีความเท่าเทียมกัน กับสหพันธรัฐ (Federation) ที่มีรัฐธรรมนูญแห่งสหพันธ์กำหนดให้รัฐสมาชิกอยู่ภายใต้กฎเกณฑ์เดียวกันและอำนาจอธิปไตยของรัฐสมาชิกถูกจำกัด เช่น สหรัฐอเมริกาและสวิตเซอร์แลนด์

**ทฤษฎีกำเนิดรัฐ**

เป็นที่น่าสังเกตว่าคำถามที่ว่า "รัฐเกิดขึ้นมาได้อย่างไร" เป็นคำถามพื้นฐานที่นักปราชญ์พยายามตอบมาหลายศตวรรษ ทฤษฎีที่สำคัญที่สุดคือทฤษฎีสัญญาประชาคม (Social Contract) ซึ่งมีนักคิด 3 ท่านที่เสนอแนวคิดแตกต่างกัน

Thomas Hobbes มองว่ามนุษย์โดยธรรมชาติมีความเห็นแก่ตัวเป็นที่ตั้ง ต่างทำตามตัณหา สภาวะธรรมชาติจึงเป็น "สงครามทุกคนต่อทุกคน" (War of all against all) ความเท่าเทียมกันของมนุษย์มิได้นำมาซึ่งสันติสุข แต่กลับนำมาซึ่งความยุ่งยาก เพราะทุกคนต่างแย่งชิงกัน มนุษย์จึงต้องก่อพันธะสัญญากันเพื่อสันติภาพ โดยสละสิทธิบางส่วนและมอบอำนาจให้รัฐที่มีอำนาจเด็ดขาด แนวคิดนี้จึงนำไปสู่การสนับสนุนรัฐเผด็จการหรือรัฐที่มีอำนาจเบ็ดเสร็จ

อย่างไรก็ตาม John Locke มีมุมมองที่แตกต่างออกไปอย่างสิ้นเชิง Locke เชื่อว่ามนุษย์โดยธรรมชาตินั้นมีเสรีภาพ ความเสมอภาค และสันติภาพอยู่แล้ว มนุษย์มีสิทธิตามธรรมชาติและตระหนักถึงกฎหมายธรรมชาติ จึงทำสัญญาประชาคมขึ้นมาเพื่อรักษาสิทธิเหล่านั้นให้มั่นคงยิ่งขึ้น อำนาจอธิปไตยจึงเกิดจากการทำสัญญาร่วมกัน และรัฐบาลที่ชอบธรรมต้องมาจากความยินยอมของประชาชน แนวคิดเรื่อง "เจตจำนงทั่วไป" (General Will) ของ Locke จึงเป็นรากฐานของ "การปกครองแบบเสรีนิยมประชาธิปไตย"

Jean-Jacques Rousseau ก้าวไปอีกขั้นหนึ่ง โดยเสนอว่าในสภาวะธรรมชาติทุกคนมีเสรีภาพ ไม่อยู่ภายใต้อาณัติของใครหากไม่ยินยอม แต่ทุกคนไม่มีหลักประกันที่แน่นอน ความรู้สึกไม่มั่นคงในชีวิตและเสรีภาพจึงบังคับให้ทุกคนมารวมตัวกัน สัญญาประชาคมของ Rousseau มีข้อผูกพัน 2 ประการ คือผูกพันกับตนเองและผูกพันกับรัฐ เจตนารวมกันของทุกคนกลายเป็นอำนาจอธิปไตย ซึ่งแบ่งแยกและโอนมิได้ รัฐสภาเป็นเพียงเครื่องมือของประชาชน ด้วยเหตุนี้ Rousseau จึงสนับสนุนประชาธิปไตยทางตรง (Pure Democracy) ที่ประชาชนสามารถถอดถอนผู้แทนได้

นอกจากทฤษฎีสัญญาประชาคมแล้ว ยังมีทฤษฎีที่ว่ารัฐเกิดจากความขัดแย้ง โดย Montesquieu เชื่อว่าอำนาจรัฐที่ดีต้องอยู่บนหลักเกณฑ์ของกฎแห่งการขัดแย้ง ต้องมี "เกียรติศักดิ์" เป็นตัวจำกัดอำนาจ ส่วน Hegel และ Marx มองว่ารัฐเป็นผลของพัฒนาการแห่งความขัดแย้งทางประวัติศาสตร์ โดยเฉพาะ Marx ที่มองรัฐในแง่เศรษฐกิจว่ารัฐเป็นเพียงผลสะท้อนของพลังทางวัตถุ

ทฤษฎีลำดับสุดท้ายที่ควรกล่าวถึงคือทฤษฎีแห่งการจัดตั้งสถาบันของ Maurice Hauriou ซึ่งเสนอว่ารัฐเป็นนิติบุคคล และเนื่องจากความเป็นนิติบุคคลนี้เอง รัฐจึงจัดตั้งสถาบันต่างๆ ขึ้นมา ทฤษฎีนี้พยายามอธิบายลักษณะทางกฎหมายของรัฐภายหลังเห็นข้อบกพร่องของทฤษฎีสัญญาประชาคม โดยทำให้เกิดการแยกระหว่างอำนาจกับตัวปัจเจกชนได้อย่างชัดเจน

กล่าวโดยสรุปแล้ว รัฐเป็นแนวคิดพื้นฐานที่สุดของกฎหมายมหาชน การเข้าใจความหมาย องค์ประกอบ รูปแบบ และทฤษฎีกำเนิดของรัฐ ย่อมเป็นรากฐานสำคัญในการศึกษาทำความเข้าใจโครงสร้างทางกฎหมายและการเมืองทั้งหมดที่ตามมา โดยเฉพาะอย่างยิ่งในบริบทของประเทศไทยซึ่งเป็นทั้งราชอาณาจักรและรัฐเดี่ยว แนวคิดเหล่านี้มีความสำคัญอย่างยิ่งต่อการออกแบบและตีความกฎหมายรัฐธรรมนูญตลอดจนการปกครองประเทศ

## หัวข้อที่ 2: การแบ่งแยกการใช้อำนาจของมองเตสกิเออ

หลักการแบ่งแยกอำนาจ (Separation of Powers) ถือเป็นหัวใจสำคัญของกฎหมายมหาชนสมัยใหม่ เป็นแนวคิดที่วางรากฐานให้แก่ระบบการปกครองของรัฐเสรีประชาธิปไตยแทบทุกประเทศในโลก ที่มาของแนวคิดนี้สืบเนื่องจากความตระหนักว่าหากปล่อยให้อำนาจทั้งหมดรวมอยู่ที่บุคคลเพียงคนเดียวหรือองค์กรเพียงองค์กรเดียว ย่อมจะเกิดการใช้อำนาจตามอำเภอใจ ทำให้ผู้อยู่ใต้ปกครองถูกกดขี่ข่มเหงอย่างหลีกเลี่ยงไม่ได้

**ความเป็นมาและเหตุผลพื้นฐาน**

Lord Acton เคยกล่าวไว้อย่างเป็นอมตะว่า "อำนาจมีแนวโน้มให้เกิดการใช้ที่ไม่ชอบ และการมีอำนาจที่อิสระที่สุดนั้นย่อมจะเกิดการกระทำที่ไม่ชอบอย่างแน่นอน" (Power tends to corrupt and absolute power corrupts absolutely) ประโยคนี้สะท้อนความจริงทางประวัติศาสตร์ที่ว่ามนุษย์ผู้ถืออำนาจมักถูกอำนาจนั้นทำให้เสื่อมไป ยิ่งมีอำนาจมากเท่าใด โอกาสที่จะใช้อำนาจโดยมิชอบก็ยิ่งมากขึ้นเท่านั้น ด้วยเหตุนี้ แนวคิดเรื่องการแบ่งแยกอำนาจจึงเกิดขึ้นเพื่อเป็นเกราะป้องกันมิให้ผู้หนึ่งผู้ใดกุมอำนาจทั้งหมดไว้ในมือ

แม้ว่าแนวคิดเรื่องการแบ่งแยกอำนาจจะปรากฏอยู่ในความคิดของนักปราชญ์หลายท่านก่อนหน้า แต่ผู้ที่นำเสนอแนวคิดนี้อย่างเป็นระบบจนกลายเป็นทฤษฎีที่สมบูรณ์คือ มองเตสกิเออ (Montesquieu, ค.ศ.1689-1755) นักปราชญ์ชาวฝรั่งเศส ผู้เขียนหนังสือ "เจตนารมณ์แห่งกฎหมาย" (The Spirit of the Laws) ซึ่งเป็นหนังสือที่มีชื่อเสียงไปทั่วโลกและมีอิทธิพลอย่างล้นพ้นต่อการออกแบบรัฐธรรมนูญของประเทศต่างๆ ตั้งแต่ศตวรรษที่ 18 เป็นต้นมา

**อำนาจสามฝ่ายตามแนวคิดของมองเตสกิเออ**

มองเตสกิเออนิยามว่าในทุกรัฐบาลมีอำนาจอยู่สามประการ คือ อำนาจนิติบัญญัติ อำนาจบริหาร และอำนาจตุลาการ เดิมทีมองเตสกิเออนิยามเพียงสองอำนาจ คืออำนาจนิติบัญญัติเกี่ยวข้องกับสิ่งที่ขึ้นอยู่กับกฎหมายของชาติ และอำนาจบริหารเกี่ยวข้องกับเรื่องที่ขึ้นอยู่กับกฎหมายของประชาชน ต่อมาท่านได้จำกัดขอบเขตอำนาจบริหารให้แคบลงเหลือเพียงอำนาจในการจัดให้มีความมั่นคงสาธารณะ แล้วเพิ่มอำนาจที่สามขึ้นมา คืออำนาจในการตัดสิน ซึ่งเป็นการประสานแนวคิดของ John Locke เข้ากับการแยกอำนาจตุลาการออกจากอำนาจของกษัตริย์

อำนาจนิติบัญญัติ (Legislative Power) คืออำนาจในการออกกฎหมายมาบังคับการดำเนินชีวิตของประชาชน รวมถึงการแก้ไขและยกเลิกกฎหมาย องค์กรที่ใช้อำนาจนี้คือรัฐสภา ซึ่งประกอบด้วยสภาผู้แทนราษฎรและวุฒิสภา สมาชิกรัฐสภาเป็นตัวแทนของประชาชน มองเตสกิเออจึงถือว่าอำนาจนิติบัญญัติมีความสำคัญมากกว่าอำนาจบริหาร เพราะเป็นอำนาจที่มาจากเจตจำนงของประชาชนโดยตรง

อำนาจบริหาร (Executive Power) คืออำนาจในการดูแลความปลอดภัยทั้งภายในและภายนอกประเทศ ใช้กำลังเพื่อให้ประชาชนเคารพกฎหมาย ปฏิบัติตามบทบัญญัติของกฎหมาย รวมถึงกิจการทั้งภายในและภายนอก องค์กรที่ใช้อำนาจนี้คือรัฐบาลหรือคณะรัฐมนตรี ซึ่งประกอบด้วยนายกรัฐมนตรีและรัฐมนตรี

อำนาจตุลาการ (Judicial Power) คืออำนาจในการจัดให้มีการลงโทษบุคคลเมื่อกระทำผิดกฎหมาย และพิพากษาวินิจฉัยข้อพิพาทระหว่างเอกชน องค์กรที่ใช้อำนาจนี้คือศาลหรือสถาบันศาล

**สาระสำคัญ 2 ประการ**

แนวคิดของมองเตสกิเออมิได้หยุดเพียงการแบ่งอำนาจออกเป็นสามส่วน แต่ยังมีสาระสำคัญอยู่ 2 ประการที่ทำให้หลักการนี้มีประสิทธิผลจริงในทางปฏิบัติ

ประการที่ 1 คือการแบ่งแยกองค์กรผู้ใช้อำนาจ กล่าวคือ อำนาจทั้งสามต้องถูกใช้โดยองค์กรที่แตกต่างกัน มิใช่ให้บุคคลหรือกลุ่มบุคคลเดียวกันใช้อำนาจทั้งหมด มองเตสกิเออยอมรับว่าอำนาจใดอำนาจหนึ่งอาจมีน้ำหนักเหนืออีกอำนาจได้ในบางสถานการณ์ แต่มิใช่การอยู่เหนืออย่างเด็ดขาดสมบูรณ์ ที่สำคัญคือต้องมีมาตรการที่เป็นหลักประกัน นั่นคือระบบการ "คานและดุลอำนาจ" (Check and Balance)

ประการที่ 2 คือการตรวจสอบคานอำนาจซึ่งกันและกัน ฝ่ายนิติบัญญัติ ฝ่ายบริหาร และฝ่ายตุลาการต้องสามารถตรวจสอบและยับยั้งการใช้อำนาจซึ่งกันและกันได้ วัตถุประสงค์ของการตรวจสอบนี้คือเพื่อทำให้เกิดดุลยภาพของอำนาจทั้งสาม ป้องกันการผูกขาดอำนาจ และเป้าหมายสูงสุดก็คือการคุ้มครองสิทธิและเสรีภาพของประชาชนนั่นเอง

**เสรีภาพในทัศนะของมองเตสกิเออ**

สิ่งที่ต้องเข้าใจอย่างลึกซึ้งคือมองเตสกิเออมิได้แบ่งแยกอำนาจเพียงเพื่อจัดระเบียบการบริหารราชการ แต่เป้าหมายที่แท้จริงคือ "เสรีภาพ" ของประชาชน มองเตสกิเออนิยามเสรีภาพว่าคือสิทธิที่จะทำอะไรก็ได้ที่กฎหมายไม่ห้าม และไม่ต้องถูกบังคับให้ทำสิ่งที่ตนไม่ต้องการ ท่านชี้ว่าเสรีภาพมิได้ขึ้นอยู่กับลักษณะของอำนาจ แต่ขึ้นอยู่กับ "สภาพแห่งการใช้อำนาจ" กล่าวคือไม่ว่าจะเป็นรูปแบบการปกครองใด หากอำนาจถูกใช้โดยมีการคานดุล เสรีภาพก็เกิดขึ้นได้ แต่หากอำนาจรวมอยู่ที่จุดเดียว เสรีภาพย่อมสูญสิ้น การแบ่งแยกการใช้อำนาจอธิปไตยจึงเป็นหนทางเดียวที่จะนำมาซึ่งอำนาจที่อ่อนตัวและเกิดเสรีภาพขึ้นในที่สุด

**การแบ่งแยกอำนาจ 2 แบบ**

การแบ่งแยกอำนาจตามแนวคิดของมองเตสกิเออสามารถจำแนกได้เป็น 2 แบบ แบบแรกคือ "การแบ่งแยกอำนาจตามภารกิจ" ซึ่งก่อให้เกิดการแบ่งแยกองค์กรตามขอบเขตอำนาจหน้าที่ที่แตกต่างกัน เช่น องค์กรฝ่ายนิติบัญญัติมีหน้าที่ออกกฎหมาย องค์กรฝ่ายบริหารมีหน้าที่บังคับใช้กฎหมาย องค์กรฝ่ายตุลาการมีหน้าที่ตัดสินคดี แบบที่สองคือ "การแบ่งแยกอำนาจในแง่ของตัวบุคคล" ซึ่งเรียกร้องให้แต่ละองค์กรต้องมีเจ้าหน้าที่ของตนเอง มิใช่เจ้าหน้าที่ขององค์กรอื่น เช่น ผู้พิพากษาต้องไม่เป็นสมาชิกรัฐสภาในเวลาเดียวกัน รัฐมนตรีต้องไม่เป็นผู้พิพากษา หลักการนี้ทำให้เกิดความสมดุลระหว่างอำนาจ ไม่ทำให้อำนาจใดอยู่ภายใต้อำนาจอื่นโดยสิ้นเชิง

**อิทธิพลต่อรัฐธรรมนูญของโลก**

อิทธิพลของแนวคิดมองเตสกิเออนั้นยิ่งใหญ่เกินจะประมาณได้ รัฐธรรมนูญสหรัฐอเมริกา ค.ศ.1787 ซึ่งเป็นรัฐธรรมนูญลายลักษณ์อักษรฉบับแรกของโลก ได้นำหลักแบ่งแยกอำนาจไปบัญญัติบังคับใช้เป็นลายลักษณ์อักษร โดยกำหนดให้อำนาจนิติบัญญัติอยู่ที่รัฐสภา (Congress) อำนาจบริหารอยู่ที่ประธานาธิบดี และอำนาจตุลาการอยู่ที่ศาลสูงสุด (Supreme Court) ต่อมารัฐธรรมนูญฝรั่งเศส ค.ศ.1791 ก็ได้รับอิทธิพลจากแนวคิดเดียวกัน จนกลายมาเป็นรากฐานของกฎหมายมหาชนจนถึงปัจจุบัน

ในบริบทของประเทศไทย หลักการแบ่งแยกอำนาจปรากฏอยู่ในรัฐธรรมนูญทุกฉบับนับตั้งแต่ พ.ศ.2475 เป็นต้นมา มีการแบ่งแยกอำนาจนิติบัญญัติ บริหาร และตุลาการ โดยมีกลไกการตรวจสอบถ่วงดุลกัน เช่น การอภิปรายไม่ไว้วางใจ การยุบสภา การวินิจฉัยความชอบด้วยรัฐธรรมนูญโดยศาลรัฐธรรมนูญ เป็นต้น

กล่าวโดยสรุปแล้ว การแบ่งแยกการใช้อำนาจตามแนวคิดของมองเตสกิเออมิใช่เป็นเพียงทฤษฎีทางวิชาการ แต่เป็นหลักการที่มีชีวิตและนำมาใช้ปฏิบัติจริงในรัฐธรรมนูญของประเทศเสรีประชาธิปไตยทั่วโลก เป็นทั้งรากฐานทางการเมืองและรากฐานทางกฎหมายที่คุ้มครองสิทธิเสรีภาพของประชาชนจากการถูกกดขี่โดยผู้มีอำนาจ อันเป็นแก่นแท้ของกฎหมายมหาชนอย่างแท้จริง

## หัวข้อที่ 3: หลักนิติรัฐและหลักนิติธรรม

หลักนิติรัฐ (Legal State) และหลักนิติธรรม (Rule of Law) เป็นสองหลักการพื้นฐานที่สำคัญที่สุดในกฎหมายมหาชนสมัยใหม่ ทั้งสองหลักการนี้มีจุดมุ่งหมายร่วมกันคือการป้องกันมิให้ผู้มีอำนาจใช้อำนาจตามอำเภอใจ และปกป้องสิทธิเสรีภาพของประชาชน แม้จะมีที่มาจากประเพณีกฎหมายที่แตกต่างกัน แต่ก็ส่งเสริมซึ่งกันและกันในการสร้างสังคมที่เป็นธรรม

**ความเป็นมาของหลักนิติรัฐ**

หลักนิติรัฐเกิดขึ้นจากบริบทของการต่อสู้ระหว่างอำนาจรัฐกับสิทธิของประชาชน หลักการนี้มีความสัมพันธ์กับทฤษฎีอำนาจอธิปไตยทั้งในทางลบและทางบวก ในทางลบ หลักนิติรัฐได้แย้งและจำกัดทฤษฎีอำนาจอธิปไตยของ Jean Bodin ซึ่งเป็นผู้เรียกร้องว่าอำนาจอธิปไตยนั้นปราศจากขอบเขต ถาวร สูงสุด ล้นพ้น แบ่งแยกมิได้ และผู้ใช้อำนาจอยู่เหนือกฎหมาย ในทางบวก หลักนิติรัฐเป็นหลักที่จำกัดการใช้อำนาจอธิปไตยที่เกิดขึ้นจากการจำกัดอำนาจตนเองของพระมหากษัตริย์ไม่ว่าจะด้วยความยินยอมหรือไม่ก็ตาม

เป็นที่น่าสังเกตว่าในระบบสมบูรณาญาสิทธิราชย์ กษัตริย์เป็นผู้ออกกฎหมายแต่ไม่อยู่ภายใต้กฎหมายที่ตนออก เมื่อกษัตริย์ขาดทศพิธราชธรรม ประชาชนได้รับความเดือดร้อน จึงเกิดการต่อต้านและนำไปสู่เหตุการณ์สำคัญทางประวัติศาสตร์ทั้งการปฏิวัติฝรั่งเศสและการประกาศอิสรภาพของอเมริกา เหตุการณ์เหล่านี้ก่อให้เกิดแนวคิดการปกครองโดยกฎหมายของประชาชน ที่อำนาจอธิปไตยเป็นของประชาชน หลักนิติรัฐจึงถือกำเนิดขึ้นมาในรัฐสมัยใหม่โดยมีรากฐานมาจากการต่อสู้ครั้งนี้

**ความหมายของหลักนิติรัฐ**

คำว่า "นิติรัฐ" มีชื่อเรียกต่างกันในแต่ละภาษา ภาษาอังกฤษเรียกว่า "Legal State" ภาษาฝรั่งเศสเรียกว่า "État de Droit" ภาษาเยอรมันเรียกว่า "Rechtsstaat" ในช่วงต้นศตวรรษที่ 19 นิติรัฐหมายถึงรัฐที่ออกกฎหมายอย่างมีเหตุผล ไม่ได้หมายถึงเป้าหมายหรือเนื้อหาของรัฐ แต่หมายถึงวิธีการหรือกระบวนการทำเป้าหมายของรัฐให้เป็นรูปธรรม

R. Carré de Malberg นักนิติศาสตร์ชาวฝรั่งเศส ให้นิยามว่านิติรัฐคือรัฐที่ต้องยอมตนอยู่ใต้กฎเกณฑ์ที่กำหนดการกระทำของรัฐต่อปัจเจกชน โดยกฎเกณฑ์ดังกล่าวมี 2 ประเภท ได้แก่ กฎเกณฑ์ที่กำหนดสิทธิและเสรีภาพของประชาชน กับกฎเกณฑ์ที่กำหนดวิธีการและมาตรการซึ่งรัฐสามารถใช้เพื่อบรรลุวัตถุประสงค์ที่กำหนด ลักษณะเด่นของนิติรัฐตามทัศนะ Carré de Malberg คือรัฐไม่สามารถใช้วิธีการอื่นนอกจากที่ระบบกฎหมายบังคับอยู่ในเวลานั้น ผลที่ตามมามีสองประการ ประการแรก เมื่อรัฐเข้าไปมีนิติสัมพันธ์กับปัจเจกชน รัฐไม่อาจฝ่าฝืนหรือหลีกเลี่ยงกฎหมายที่ใช้บังคับอยู่ได้ ประการที่สอง ในนิติรัฐที่พัฒนาสมบูรณ์แล้ว รัฐไม่อาจบังคับปัจเจกชนได้เว้นแต่จะมีกฎหมายที่ตราขึ้นโดยรัฐสภาให้อำนาจไว้ ยิ่งไปกว่านั้น นิติรัฐให้หลักประกันแก่ปัจเจกชนว่าสามารถร้องขอให้ผู้มีอำนาจวินิจฉัยคดีเพิกถอนการกระทำที่ไม่ชอบด้วยกฎหมายได้

ในฝ่ายนักวิชาการไทย ศาสตราจารย์ สมยศ เชื้อไทย ให้นิยามว่านิติรัฐคือรัฐที่รับรองและคุ้มครองสิทธิและเสรีภาพขั้นพื้นฐานของราษฎรในรัฐธรรมนูญ รัฐมีอำนาจจำกัดโดยยอมอยู่ภายใต้กฎหมายของตนอย่างเคร่งครัด ศาสตราจารย์ หยุด แสงอุทัย อธิบายเพิ่มเติมว่านิติรัฐคือรัฐที่ยอมตนอยู่ใต้บังคับแห่งกฎหมายซึ่งรัฐเป็นผู้ตราขึ้นเอง มีบทบัญญัติสำคัญถึงเสรีภาพของราษฎร เช่น เสรีภาพในร่างกาย ในทรัพย์สิน ในการทำสัญญา และในการประกอบอาชีพ การที่รัฐจะจำกัดสิทธิได้ต้องด้วยความยินยอมของราษฎรตามกลไกนิติบัญญัติ ศาสตราจารย์ วรพจน์ วิศรุตพิชญ์ มองว่านิติรัฐเป็นหลักประกันสิทธิเสรีภาพของราษฎรจากการใช้อำนาจตามอำเภอใจขององค์กรฝ่ายบริหาร ได้แก่ รัฐบาล หน่วยงาน และเจ้าหน้าที่ของรัฐ ส่วนศาสตราจารย์ สมชาย ปรีชาศิลปกุล อธิบายว่านิติรัฐเป็นแนวคิดที่ถูกสร้างขึ้นเพื่อควบคุมการกระทำของรัฐมิให้ดำเนินไปตามอำเภอใจ การใช้อำนาจรัฐต้องอยู่ในกรอบของกฎหมายที่วางไว้ล่วงหน้า บนพื้นฐานความเชื่อว่าการกระทำเช่นนี้จะช่วยปกป้องสิทธิเสรีภาพของประชาชนให้ดำรงอยู่อย่างมั่นคง

**สาระสำคัญของหลักนิติรัฐ — ในด้านรูปแบบ 4 ประการ**

ประการแรก หลักการแบ่งแยกอำนาจ ซึ่งเป็นหลักพื้นฐานของนิติรัฐ มีการแบ่งแยกการใช้อำนาจอธิปไตยออกเป็นสามอำนาจ คือนิติบัญญัติ บริหาร และตุลาการ ให้สามารถตรวจสอบถ่วงดุลและยับยั้งซึ่งกันและกัน ทั้งการแบ่งแยกตามภารกิจและการแบ่งแยกในแง่ของตัวบุคคล ดังที่ ศาสตราจารย์ บรรเจิด สิงคเนติ ได้อธิบายว่าหลักการนี้ทำให้เกิดความสมดุลระหว่างอำนาจ

ประการที่สอง หลักความชอบด้วยกฎหมายในการใช้อำนาจรัฐ กล่าวคือการใช้อำนาจรัฐเพื่อดำเนินการต่างๆ ต้องถูกผูกพันโดยกฎหมาย ฝ่ายนิติบัญญัติต้องผูกมัดโดยรัฐธรรมนูญ กฎหมายฝ่ายนิติบัญญัติและกฎเกณฑ์แห่งกฎหมายฝ่ายบริหาร ไม่ว่าจะเป็นพระราชบัญญัติ พระราชกำหนด พระราชกฤษฎีกา กฎหมายลำดับรอง และจารีตประเพณี ล้วนเป็นกรอบที่ผูกมัดการใช้อำนาจทั้งสิ้น

ประการที่สาม หลักการคุ้มครองสิทธิและเสรีภาพของประชาชน รัฐธรรมนูญของรัฐเสรีประชาธิปไตยบัญญัติรับรองสิทธิและเสรีภาพขั้นพื้นฐาน (Fundamental rights and liberty) ต่างๆ ที่มนุษย์จำต้องมีเพื่อพัฒนาบุคลิกภาพทั้งในทางกายภาพและจิตใจ หลักนิติรัฐเกี่ยวพันกับสิทธิในเสรีภาพของบุคคลและสิทธิในความเสมอภาค อันเป็นพื้นฐานของ "ศักดิ์ศรีความเป็นมนุษย์" การแทรกแซงสิทธิเสรีภาพโดยอำนาจรัฐจะกระทำได้ก็ต่อเมื่อมีกฎหมายที่ผ่านความเห็นชอบจากตัวแทนของประชาชนแล้วเท่านั้น และการจำกัดสิทธิต้องมีผลบังคับเป็นการทั่วไป มิใช่มุ่งหมายใช้บังคับแก่กรณีใดกรณีหนึ่งหรือบุคคลใดบุคคลหนึ่งเป็นการเฉพาะ

ประการที่สี่ หลักความมั่นคงของกฎหมาย ซึ่งแม้จะไม่ได้บัญญัติไว้เป็นลายลักษณ์อักษร แต่ก็เป็นหลักสำคัญยิ่ง ประกอบด้วยหลักย่อยหลายประการ ได้แก่ กฎเกณฑ์ทางกฎหมายต้องมีเนื้อหาที่แน่นอนและชัดเจน ให้ประชาชนทราบว่ากฎหมายเรียกร้องอะไรจากตน กฎเกณฑ์ต้องมีความถาวรต่อเนื่อง คงอยู่ต่อไปในอนาคต ทำให้ประชาชนมั่นใจว่าสามารถใช้เป็นหลักในการดำเนินชีวิตและธุรกิจ คำสั่งทางปกครองต้องสอดคล้องกับหลักความมั่นคงของกฎหมาย คำพิพากษาของศาลที่เป็นที่สุดแล้วย่อมเป็นที่ยุติ และหากการตัดสินใจของรัฐไม่สอดคล้องกับกฎหมาย ก็ต้องมีการชดเชยความเสียหายที่เกิดขึ้นกับเอกชน

**สาระสำคัญของหลักนิติรัฐ — ในด้านเนื้อหา 3 ประการ**

ประการแรก รัฐต้องเคารพต่อสิทธิและเสรีภาพของปัจเจกบุคคล การแทรกแซงจะกระทำได้ก็ต่อเมื่ออาศัยอำนาจตามกฎหมายที่ตราโดยความเห็นชอบของประชาชน รัฐและองค์กรต่างๆ ที่จัดตั้งขึ้นต้องเคารพกฎหมายที่ตราขึ้นทุกลำดับชั้น

ประการที่สอง การใช้อำนาจรัฐต้องเคารพหลักความพอสมควรแก่เหตุ (Principle of Proportionality) หรือ "หลักแห่งความได้สัดส่วน" ประกอบด้วย 3 หลักย่อย ได้แก่ หลักความสัมฤทธิผล ที่ถามว่ามาตรการที่นำมาใช้นั้นเพื่ออะไรและชอบธรรมหรือไม่ หลักความจำเป็น ที่ถามว่าเป็นมาตรการที่จำเป็นหรือไม่หรือมีมาตรการอื่นที่กระทบสิทธิเสรีภาพน้อยกว่า และหลักความพอสมควรแก่เหตุในความหมายอย่างแคบ ที่ถามว่ามาตรการนั้นก่อให้เกิดดุลยภาพระหว่างประโยชน์สาธารณะกับประโยชน์ของปัจเจกชนหรือไม่

ประการที่สาม หลักการเยียวยาความเสียหาย ซึ่งเป็นหัวใจสำคัญของหลักนิติรัฐ กรณีที่รัฐหรือเจ้าหน้าที่รัฐใช้อำนาจตามอำเภอใจก่อให้เกิดความเสียหายแก่ผู้อยู่ใต้การปกครอง ฝ่ายรัฐต้องรับผิดชอบในการใช้อำนาจดังกล่าว หลักการนี้สำคัญเพราะหากรัฐทำผิดแต่ไม่ต้องรับผิดชอบ หลักนิติรัฐก็ไร้ความหมาย

**องค์กรตรวจสอบการใช้อำนาจรัฐ**

ในทางปฏิบัติ ประเทศไทยมีองค์กรตรวจสอบการใช้อำนาจรัฐตามหลักนิติรัฐหลายองค์กร ได้แก่ ศาลยุติธรรม ศาลปกครอง ศาลรัฐธรรมนูญ และองค์กรอิสระตามรัฐธรรมนูญ เช่น คณะกรรมการการเลือกตั้ง คณะกรรมการป้องกันและปราบปรามการทุจริตแห่งชาติ ผู้ตรวจการแผ่นดิน คณะกรรมการตรวจเงินแผ่นดิน คณะกรรมการสิทธิมนุษยชนแห่งชาติ และคณะกรรมการกึ่งตุลาการ องค์กรเหล่านี้มีขึ้นเพื่อควบคุมตรวจสอบการใช้อำนาจรัฐให้เคารพต่อหลักนิติรัฐ ซึ่งก็เท่ากับเป็นการคุ้มครองสิทธิเสรีภาพของประชาชนนั่นเอง

**หลักนิติธรรม (The Rule of Law)**

หลักนิติธรรมมีพัฒนาการจากอังกฤษ เริ่มจาก Magna Carta ค.ศ.1215 ซึ่งเกิดขึ้นเพื่อจำกัดอำนาจพระเจ้าจอห์น เป็นเอกสารสำคัญทางประวัติศาสตร์ที่ถือเป็นจุดเริ่มต้นของหลักการปกครองโดยกฎหมาย หลักนิติธรรมหมายถึงการปกครองโดยกฎหมาย บุคคลเสมอกันในกฎหมาย บุคคลต้องรับโทษเมื่อมีกฎหมายบัญญัติว่าเป็นความผิด และต้องได้รับการพิจารณาคดีโดยศาลซึ่งมีความเป็นอิสระ

A.V. Dicey นักกฎหมายอังกฤษผู้มีชื่อเสียง ได้กำหนดองค์ประกอบ 3 ประการของหลักนิติธรรม ประการแรก ไม่มีบุคคลถูกลงโทษเว้นแต่กระทำฝ่าฝืนกฎหมาย โดยศาลยุติธรรม (Ordinary Court) ทำหน้าที่พิจารณา อันตรงข้ามกับการปกครองที่ยินยอมให้เจ้าหน้าที่รัฐใช้อำนาจตามอำเภอใจ ประการที่สอง ไม่มีบุคคลใดอยู่เหนือกฎหมาย ไม่ว่าจะเป็นเจ้าหน้าที่รัฐหรือเอกชน สิ่งที่น่าสังเกตเป็นพิเศษคือ Dicey ปฏิเสธการจัดตั้งศาลปกครองเช่นในฝรั่งเศส เพราะเชื่อว่าเป็นการมอบอภิสิทธิ์ให้ฝ่ายรัฐ และสรุปว่าการไม่มีศาลปกครองสามารถคุ้มครองสิทธิเสรีภาพของประชาชนได้ดีกว่า ประการที่สาม กฎหมายรัฐธรรมนูญอังกฤษ (Common Law) ซึ่งเกิดจากคำพิพากษาของศาลเกี่ยวกับสิทธิของบุคคล เป็นหลักประกันสิทธิเสรีภาพที่ดีกว่ารัฐธรรมนูญลายลักษณ์อักษร

ศาสตราจารย์ ธานินทร์ กรัยวิเชียร นักวิชาการกฎหมายไทย อธิบายว่าหลักนิติธรรมคือหลักการแห่งกฎหมายที่เทิดทูนศักดิ์ศรีแห่งความเป็นมนุษย์และยอมรับสิทธิมนุษยชนทุกแง่ทุกมุม รัฐต้องให้ความคุ้มครองจากลัทธิทรราช และศาลมีอำนาจอิสระในการตัดสินคดีตามกฎหมายบ้านเมือง

**รัฐตำรวจเปรียบเทียบกับนิติรัฐ**

เพื่อให้เข้าใจหลักนิติรัฐได้ชัดเจนยิ่งขึ้น ควรทำความเข้าใจแนวคิดที่ตรงข้ามคือ "รัฐตำรวจ" (Police State) ในรัฐตำรวจ ผู้ใช้อำนาจสามารถใช้อำนาจได้ตามอำเภอใจ เพราะถือว่าวัตถุประสงค์เป็นตัวกำหนดวิธีการ รัฐตำรวจจะกระทำการใดก็ได้โดยไม่ต้องคำนึงว่าถูกต้องชอบธรรมหรือไม่ เพียงเพื่อให้ได้สิ่งที่ต้องการ ไม่จำต้องคำนึงว่าจะกระทบสิทธิเสรีภาพของประชาชนหรือไม่ อันเป็นหลักการของเผด็จการ นิติรัฐจึงเป็นสิ่งที่ตรงกันข้ามกับรัฐตำรวจโดยสิ้นเชิง

**ความแตกต่างระหว่างหลักนิติรัฐกับหลักนิติธรรม**

หลักนิติธรรม (Rule of Law) มีรากฐานจากอังกฤษในระบบ Common Law เน้นความเสมอภาคต่อหน้ากฎหมายและการพิจารณาคดีโดยศาลอิสระ ส่วนหลักนิติรัฐ (Legal State) มีรากฐานจากยุโรปแผ่นดินใหญ่ในระบบ Civil Law โดยเฉพาะฝรั่งเศสและเยอรมัน เน้นโครงสร้างและกรอบกฎหมายที่ควบคุมการใช้อำนาจของรัฐ มีสาระสำคัญ 4 ประการดังที่กล่าวมาข้างต้น

อย่างไรก็ตาม ทั้งสองหลักมุ่งเป้าเดียวกันคือปกป้องประชาชนจากการใช้อำนาจตามอำเภอใจ สะท้อนให้เห็นการปกครองประเทศโดยกฎหมาย

กล่าวโดยสรุปแล้ว หลักนิติรัฐและหลักนิติธรรมเป็นเสาหลักที่ค้ำจุนรัฐเสรีประชาธิปไตย ประเทศไทยซึ่งได้รับอิทธิพลทั้งจาก Common Law และ Civil Law ได้นำหลักการทั้งสองมาประยุกต์ใช้ในระบบกฎหมายไทย ทั้งการจัดตั้งศาลปกครอง ศาลรัฐธรรมนูญ และองค์กรอิสระต่างๆ ล้วนเป็นผลสะท้อนของการนำหลักนิติรัฐมาใช้อย่างเป็นรูปธรรม ทำให้ประชาชนมีหลักประกันว่าอำนาจรัฐจะถูกใช้ภายใต้กรอบของกฎหมาย มิใช่ตามอำเภอใจของผู้มีอำนาจ อันเป็นแก่นแท้ของการปกครองในระบอบประชาธิปไตยสมัยใหม่

`;
    /* ════════════════════════════════════════════════════ */

    /* ─── State ──────────────────────────────────────── */
    let currentTheme = 'warm';
    let fontSize = 19;
    let currentMode = 'paste';

    /* ─── Markdown Parser ────────────────────────────── */
    function parseMarkdown(md) {
      if (!md) return '';

      let html = md
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');

      html = html.replace(/^---+$/gm, '<hr class="divider"/>');
      html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
      html = html.replace(/^## (.+)$/gm,  '<h2>$1</h2>');
      html = html.replace(/^# (.+)$/gm,   '<h1>$1</h1>');
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

      html = html.split(/\n\n+/).map(block => {
        block = block.trim();
        if (!block) return '';
        if (block.startsWith('<h') || block.startsWith('<hr') ||
            block.startsWith('<ul') || block.startsWith('<ol')) return block;
        block = block.replace(/\n/g, '<br/>');
        return `<p>${block}</p>`;
      }).join('\n');

      return html;
    }

    /* ─── Theme ──────────────────────────────────────── */
    function setTheme(theme) {
      document.body.className = theme;
      currentTheme = theme;
      document.querySelectorAll('.theme-dot').forEach(d => d.classList.remove('active'));
      document.getElementById('dot-' + theme).classList.add('active');
    }

    /* ─── Font Size ──────────────────────────────────── */
    function changeFontSize(delta) {
      fontSize = Math.max(14, Math.min(28, fontSize + delta));
      document.getElementById('font-label').textContent = fontSize;
      document.getElementById('reader-content').style.fontSize = fontSize + 'px';
    }

    /* ─── Mode ───────────────────────────────────────── */
    function setMode(mode) {
      currentMode = mode;
      const pasteView = document.getElementById('view-paste');
      const readView  = document.getElementById('view-read');
      const btnEdit   = document.getElementById('btn-edit');
      const btnRead   = document.getElementById('btn-read');

      if (mode === 'paste') {
        pasteView.style.display = 'block';
        pasteView.classList.add('fade-in');
        readView.style.display  = 'none';
        btnEdit.style.display   = 'none';
        btnRead.style.display   = 'inline-flex';
        setTimeout(() => pasteView.classList.remove('fade-in'), 400);
        document.getElementById('textarea').focus();
      } else {
        const raw     = document.getElementById('textarea').value;
        const content = document.getElementById('reader-content');
        content.innerHTML = parseMarkdown(raw);
        content.style.fontSize = fontSize + 'px';
        content.classList.add('fade-in');
        setTimeout(() => content.classList.remove('fade-in'), 400);

        pasteView.style.display = 'none';
        readView.style.display  = 'block';
        btnEdit.style.display   = 'inline-flex';
        btnRead.style.display   = 'none';
        window.scrollTo({ top: 0, behavior: 'instant' });
      }
    }

    function tryRead() {
      if (document.getElementById('textarea').value.trim()) setMode('read');
    }

    function clearText() {
      document.getElementById('textarea').value = '';
      updateTextareaState();
    }

    function scrollTop() {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    /* ─── Textarea reactive state ────────────────────── */
    function updateTextareaState() {
      const raw = document.getElementById('textarea').value.trim();
      const wc  = raw ? raw.split(/\s+/).length : 0;
      document.getElementById('word-count').textContent = raw ? '~' + wc + ' คำ' : '';
      document.getElementById('btn-read').disabled  = !raw;
      document.getElementById('btn-start').disabled = !raw;
      document.getElementById('btn-clear').disabled = !raw;
    }

    document.getElementById('textarea').addEventListener('input', updateTextareaState);

    /* ─── Auto-load embedded content on start ────────── */
    window.addEventListener('DOMContentLoaded', () => {
      const content = MARKDOWN_CONTENT.trim();
      if (content) {
        document.getElementById('textarea').value = content;
        updateTextareaState();
        setMode('read'); // เปิด Read mode ทันที
      } else {
        updateTextareaState();
      }
    });
  </script>
